name: Build and Tag v5

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node (example)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create tag v5
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # create tag v5
          git tag v5

          # push tag to GitHub
          git push origin v5
