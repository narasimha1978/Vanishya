name: Build and Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show project files
        run: ls -R

      - name: Create tag v5
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v5
          git push origin v5
